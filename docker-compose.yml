# LLM Q&A API — same service names and networks as k8s/data-platform.
#
# CPU/GPU: set LLM_USE_GPU in llm/.env (false | true | auto), then:
#   ./scripts/compose.sh up -d --build
# Full local stack: from repo root  make local-up
#
# LangChain API (host): http://localhost:8001/docs
# LangGraph API (host): http://localhost:8002/docs
# pgvector (host):      localhost:5433  (vector/vector, db=vectors)
# Trino (host):         http://localhost:8086

services:
  llm-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        SKIP_PREFETCH: ${SKIP_PREFETCH:-true}
        BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
        ADAPTER_REPO: ${ADAPTER_REPO:-Glccampos/llm_qween}
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    image: ${LLM_API_IMAGE:-local/llm-api:latest}
    container_name: llm-api
    hostname: llm-api
    ports:
      - "${LLM_API_PORT:-8001}:8000"
    env_file:
      - path: ./.env
        required: false
      - path: ./api/.env
        required: false
    environment:
      LLM_IN_DOCKER: "1"
      LLM_DEVICE: ${LLM_DEVICE:-cpu}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      HF_TOKEN: ${HF_TOKEN:-}
      BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      ADAPTER_REPO: ${ADAPTER_REPO:-Glccampos/llm_qween}
      DOCUMENTS_DIR: /app/documents
      # In-container DNS (do not use localhost:5433 from llm/.env — that is for host-only runs)
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: "5432"
      PGVECTOR_USER: ${PGVECTOR_USER:-vector}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-vector}
      PGVECTOR_DB: ${PGVECTOR_DB:-vectors}
      RAG_AUTO_INGEST: ${RAG_AUTO_INGEST:-false}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LLM_LANGGRAPH_PORT: ${LLM_LANGGRAPH_PORT:-8002}
      TRINO_MCP_SSE_URL: http://llm-trino-mcp:8765/sse
      TRINO_MCP_HOST: llm-trino-mcp
      # MinIO / MLflow (same hostnames as credit_risk_forecast stack on shared networks)
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow_server:5000}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-password1234}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      MLFLOW_S3_IGNORE_TLS: ${MLFLOW_S3_IGNORE_TLS:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio123}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./api/documents:/app/documents
    depends_on:
      llm-trino-mcp:
        condition: service_healthy
    networks:
      - llm_internal
      - minio_shared
      - credit_risk_shared
      - airflow_shared
      - trino_shared
    restart: unless-stopped

  llm-langgraph-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        SKIP_PREFETCH: ${SKIP_PREFETCH:-true}
        BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
        ADAPTER_REPO: ${ADAPTER_REPO:-Glccampos/llm_qween}
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    image: ${LLM_LANGGRAPH_IMAGE:-local/llm-langgraph-api:latest}
    container_name: llm-langgraph-api
    hostname: llm-langgraph-api
    command: ["python", "server_langgraph.py"]
    ports:
      - "${LLM_LANGGRAPH_PORT:-8002}:8000"
    env_file:
      - path: ./.env
        required: false
      - path: ./api/.env
        required: false
    environment:
      LLM_IN_DOCKER: "1"
      LLM_DEVICE: ${LLM_DEVICE:-cpu}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      HF_TOKEN: ${HF_TOKEN:-}
      BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      ADAPTER_REPO: ${ADAPTER_REPO:-Glccampos/llm_qween}
      DOCUMENTS_DIR: /app/documents
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: "5432"
      PGVECTOR_USER: ${PGVECTOR_USER:-vector}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-vector}
      PGVECTOR_DB: ${PGVECTOR_DB:-vectors}
      RAG_AUTO_INGEST: ${RAG_AUTO_INGEST:-false}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-llm-langgraph}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-llm-langgraph}
      LANGSMITH_MODEL_NAME: ${LANGSMITH_MODEL_NAME:-qween}
      LANGSMITH_INPUT_PRICE_PER_UNIT: ${LANGSMITH_INPUT_PRICE_PER_UNIT:-0}
      LANGSMITH_OUTPUT_PRICE_PER_UNIT: ${LANGSMITH_OUTPUT_PRICE_PER_UNIT:-0}
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./api/documents:/app/documents
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/langgraph"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3
    networks:
      - llm_internal
      - trino_shared
    restart: unless-stopped

  llm-trino-mcp:
    build:
      context: ../mcp
      dockerfile: Dockerfile
    image: ${LLM_TRINO_MCP_IMAGE:-local/llm-trino-mcp:latest}
    container_name: llm-trino-mcp
    hostname: llm-trino-mcp
    ports:
      - "${MCP_PORT:-8765}:8765"
    environment:
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-admin}
      TRINO_PASSWORD: ${TRINO_PASSWORD:-}
      TRINO_HTTP_SCHEME: ${TRINO_HTTP_SCHEME:-http}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8765), 3); s.close()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - llm_internal
      - trino_shared
    restart: unless-stopped

networks:
  # llm-api <-> llm-trino-mcp (SSE on :8765)
  llm_internal:
    name: llm_internal
  # MinIO (alias `minio`) — from credit_risk_forecast/docker-compose.yml
  minio_shared:
    external: true
    name: minio_minio
  # credit_api, Spark, etc.
  credit_risk_shared:
    external: true
    name: credit_risk_shared
  # MLflow + Airflow default project network (credit_risk_forecast/ compose + airflow compose)
  airflow_shared:
    external: true
    name: ${AIRFLOW_DOCKER_NETWORK:-credit_risk_forecast_default}
  # Trino coordinator hostname `trino`
  trino_shared:
    external: true
    name: trino_trino-network

volumes:
  hf-cache:
